<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Custom ATS</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts/main.js"></script>
</head>
<body>
    <a href="api-tests.html">API Tests</a>
    <div class="container">
        <h1>Custom ATS</h1>
        <div class="flexed-row">
            <label for="search" class="form-label"><span class="align-middle">Search:</span></label>
            <input id="searchInput" type="search" class="main-child form-control" placeholder="Example: java">
        </div>
        <div id="hintBox"></div>
        <div class="row">
            <div class="col-7">
                <div id="categoryAccordion">
                    <div class="loadingPositioned">
                        Loading <div class="spinner-border spinner-border-sm"></div>
                    </div>
                </div>
            </div>
            <div class="col-5">
                <div id="summaryColumn">
                    <p>Summary:</p>
                    <textarea id="summaryContainer" disabled></textarea>
                    <button id="submitButton" class="btn btn-primary">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <button id="backToTopButton" type="button" class="btn btn-sm btn-secondary">▲<br>Back<br>to Top</button> 
    
    <div class="modalContainer">
        <div class="container rounded-2">
            <div class="row">
                <div class="col-12">
                    <p class="float-start">Results:</p>
                    <button type="button" class="btn-close float-end"></button>
                </div>
            </div>
            <div class="row main">
                <div class="col-12">
                    <textarea id="resultsContainer" disabled></textarea>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
