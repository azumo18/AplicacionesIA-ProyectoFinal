<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Custom ATS - API Tests</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts/testdata-loading.js"></script>
    <script src="scripts/api-tests.js"></script>
</head>

<body>
    <p class="mx-auto display-6">Tau</p>
    <p>Dynamic Rules:</p>
    <textarea id="dynamicRulesContainer"></textarea>
    <p>Query:</p>
    <div class="flexed-row">
        <input id="queryContainer" type="text" class="main-child" />
        <button id="postQueryButton" class="btn btn-light">POST</button>

        <!-- Candidate Facts test -->
        <button id="postCandidateFactsButton" class="btn btn-light">TEST Candidate Facts</button>
    </div>
    <p>Results:</p>
    <textarea id="resultsContainer" disabled></textarea>
    <hr>
    <p class="mx-auto display-6">Ollama</p>
    <p>Prompt:</p>
    <div class="flexed-row">
        <input id="promptContainer" type="text" class="main-child" />
        <button id="postPromptButton" class="btn btn-light">POST</button>
    </div>
    <p>Results:</p>
    <textarea id="resultsContainer2" disabled></textarea>
</body>

</html>
